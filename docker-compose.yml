services:
  service-a:
    build: ./a-service
    ports:
      - "3001:3001"
    env_file:
      - .env
    volumes:
      - ./a-service:/app
      - ./config:/app/config
      - ./communicator:/app/communicator   # 👈 ADD THIS
      - /app/node_modules
    command: sh -c "npm install && nodemon"

  service-b:
    build: ./b-service
    ports:
      - "3002:3002"
    env_file:
      - .env
    volumes:
      - ./b-service:/app
      - ./config:/app/config
      - ./communicator:/app/communicator   # 👈 ADD THIS
      - /app/node_modules
    command: sh -c "npm install && nodemon"

  service-x:
    build: ./x-service
    ports:
      - "3003:3003"
    env_file:
      - .env
    volumes:
      - ./x-service:/app
      - ./config:/app/config
      - ./communicator:/app/communicator   # 👈 ADD THIS
      - /app/node_modules
    command: sh -c "npm install && nodemon"

  gateway:
    build: ./gateway
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - ./gateway:/app
      - ./config:/app/config
      - ./communicator:/app/communicator   # 👈 ADD THIS
      - /app/node_modules
    command: sh -c "npm install && nodemon"
  
  broker:
    image: apache/kafka:latest
    ports:
      - 9092:9092
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093   # ✅ FIXED
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker:9092    # ✅ FIXED
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
    
  